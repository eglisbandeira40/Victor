<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Suporte Victor | Bandeira Soluções</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-content">
      <div class="logo">
        <span class="rec">🔴 REC</span>
        <div class="logo-text">
          <strong style="font-size: 1.5rem;">Bandeira</strong>
          <span style="font-size: 1rem;">Audiovisual e Tráfego Pago</span>
        </div>
      </div>
      <p class="header-sub" style="color: #b0b0b0;">Assistente Virtual | @vitaobandeira</p>
    </div>
  </header>

  <!-- CHAT BOX -->
  <main>
    <div class="chat-container">

      <div class="chat-messages" id="chatMessages">
        <!-- Mensagem de boas vindas -->
        <div class="message bot">
          <div class="avatar">V</div>
          <div class="bubble">
            👋 Olá! Sou o assistente virtual do <strong>Victor Bandeira</strong>.<br/>
            Posso te ajudar com <strong>tráfego pago</strong>, campanhas e estratégias. Como posso te ajudar hoje?
          </div>
        </div>
      </div>

      <!-- INPUT -->
      <div class="chat-input-area">
        <input
          type="text"
          id="userInput"
          placeholder="Digite sua mensagem..."
          autocomplete="off"
        />
        <button id="sendBtn" onclick="sendMessage()">
          ➤
        </button>
      </div>

    </div>
  </main>

  <footer>
    <p>© 2026 Bandeira Soluções Audiovisual e Tráfego Pago · @vitaobandeira</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
